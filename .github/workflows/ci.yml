name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wcp
          POSTGRES_PASSWORD: wcp
          POSTGRES_DB: wcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wcp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://wcp:wcp@localhost:5432/wcp_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: mock
      PHASE: 1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: backend
        run: poetry install
      - name: Run database migrations
        working-directory: backend
        run: poetry run alembic upgrade head
      - name: Lint
        working-directory: backend
        run: poetry run ruff check .
      - name: Run unit tests
        working-directory: backend
        run: poetry run pytest tests/unit -v
      - name: Run integration tests
        working-directory: backend
        run: poetry run pytest tests/integration -v --ignore=tests/integration/test_e2e_pipeline.py

    # Note: mypy is a local strict check only (slow in CI).
    # Run `poetry run mypy src/` locally before committing Python changes.

  agent:
    name: TypeScript Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json
      - name: Install dependencies
        working-directory: agent
        run: npm ci
      - name: Type check
        working-directory: agent
        run: npm run typecheck
      - name: Lint
        working-directory: agent
        run: npm run lint
      - name: Build
        working-directory: agent
        run: npm run build
      - name: Run tests
        working-directory: agent
        run: npm test

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Run tests
        working-directory: frontend
        run: npm test
