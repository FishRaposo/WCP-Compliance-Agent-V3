name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: wcp_test
          POSTGRES_USER: wcp
          POSTGRES_PASSWORD: wcp
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: elasticsearch:8.15.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports: ["9200:9200"]
        options: >-
          --health-cmd "wget -qO- http://localhost:9200/_cluster/health || exit 1"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: backend
        run: poetry install
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://wcp:wcp@localhost:5432/wcp_test
        run: poetry run alembic upgrade head
      - name: Seed data
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://wcp:wcp@localhost:5432/wcp_test
          REDIS_URL: redis://localhost:6379
          ELASTICSEARCH_URL: http://localhost:9200
        run: poetry run python scripts/seed_all.py
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://wcp:wcp@localhost:5432/wcp_test
          REDIS_URL: redis://localhost:6379
          ELASTICSEARCH_URL: http://localhost:9200
          CELERY_BROKER_URL: redis://localhost:6379/0
          PHASE: "2"
        run: poetry run pytest tests/unit tests/integration -v

  agent:
    name: TypeScript Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json
      - name: Install dependencies
        working-directory: agent
        run: npm ci
      - name: Type check
        working-directory: agent
        run: npm run typecheck
      - name: Run tests
        working-directory: agent
        run: npm test

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build
