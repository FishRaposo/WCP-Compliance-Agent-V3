name: CI Pipeline

# Triggers on every push and PR to main/develop branches.
# Runs all quality gates in strict sequential order — each stage depends on
# the previous passing. This matches the documented ADR-004 testing hierarchy.
#
# Stage order:
#   1. build             — TypeScript compilation (catches type errors)
#   2. pipeline-lint     — AST architectural enforcement (layer isolation)
#   3. unit-tests        — Isolated module tests (mock mode, no API key)
#   4. pipeline-tests    — Full three-layer pipeline tests (mock mode)
#   5. coverage          — Line/branch/function coverage ≥80% gate (mock mode)
#   6. calibration       — Golden-set quality gate (requires OPENAI_API_KEY secret)
#   7. e2e               — Playwright API scenario tests (I6, mock mode)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '22'

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1: Build
  # Compiles TypeScript and validates all imports resolve.
  # All subsequent stages depend on this passing.
  # ---------------------------------------------------------------------------
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stage 2: Pipeline Lint (AST Architectural Enforcement)
  # Runs parallel to unit-tests since it only needs the source, not the build.
  # Enforces:
  #   - Agent.generate() only in layer2-llm-verdict.ts
  #   - generateWcpDecision returns TrustScoredDecision
  #   - Orchestrator uses executeDecisionPipeline
  #   - Layer 2 calls validateReferencedCheckIds
  # ---------------------------------------------------------------------------
  pipeline-lint:
    name: Pipeline Discipline Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run pipeline discipline lint
        run: pnpm run lint:pipeline

  # ---------------------------------------------------------------------------
  # Stage 3: Unit Tests
  # Tests isolated modules in mock mode (no OPENAI_API_KEY required).
  # Covers: config, utils, Layer 1 extraction, trust scoring, pipeline contracts.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      OPENAI_API_KEY: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm run test:unit

  # ---------------------------------------------------------------------------
  # Stage 3b: Retrieval Module Tests (Phase 02)
  # Tests hybrid-retriever, BM25, vector, and RRF fusion in mock mode.
  # No ES or DB required — in-memory fallback covers all paths.
  # ---------------------------------------------------------------------------
  retrieval-tests:
    name: Retrieval Module Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      OPENAI_API_KEY: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run retrieval tests
        run: pnpm run test:retrieval

  # ---------------------------------------------------------------------------
  # Stage 4: Pipeline Tests (Integration)
  # Runs the full three-layer decision pipeline end-to-end in mock mode.
  # This is the critical gate — must pass before coverage and calibration.
  # ---------------------------------------------------------------------------
  pipeline-tests:
    name: Pipeline Tests (Integration)
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - retrieval-tests
      - pipeline-lint
    env:
      OPENAI_API_KEY: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run pipeline tests
        run: pnpm run test:pipeline

  # ---------------------------------------------------------------------------
  # Stage 5: Coverage Gate
  # Runs all non-calibration tests with coverage reporting.
  # Fails if line/function/statement coverage drops below 80%.
  # Uploads HTML report as an artifact for review on failure.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage Gate (≥80%)
    runs-on: ubuntu-latest
    needs: pipeline-tests
    env:
      OPENAI_API_KEY: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage 6: Trust Calibration (Quality Gate)
  # Runs the golden-set calibration tests against real OpenAI API.
  # Requires OPENAI_API_KEY secret — skipped in forks and offline.
  # Quality thresholds:
  #   - >95% violation detection rate
  #   - <2% false-approve rate
  # ---------------------------------------------------------------------------
  calibration:
    name: Trust Calibration (Golden Set)
    runs-on: ubuntu-latest
    needs: pipeline-tests
    # Only run if the secret is available (skips in forks and local dev)
    if: ${{ vars.ENABLE_CALIBRATION == 'true' || github.ref == 'refs/heads/main' }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run trust calibration (quality gate)
        run: pnpm run test:calibration
        # M6: Hard failure on main branch — quality gate enforced.
        # On PRs, calibration failures are informational only.
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Upload calibration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calibration-results
          path: |
            coverage/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Stage 7: Playwright E2E Tests (I6)
  # Starts the built server in mock mode and runs 6 API scenario tests + health.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: pipeline-tests
    env:
      OPENAI_API_KEY: mock
      NODE_ENV: test
      E2E_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server (background)
        run: |
          OPENAI_API_KEY=mock node dist/server.js &
          sleep 3

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
