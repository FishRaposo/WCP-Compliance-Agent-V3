services:
  # ─── Data Layer ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: wcp
      POSTGRES_USER: wcp
      POSTGRES_PASSWORD: wcp
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── Observability ──────────────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    ports: ["6006:6006"]
    environment:
      PHOENIX_PORT: 6006
    volumes:
      - phoenix_data:/mnt/data

  # ─── Backend (Python) ───────────────────────────────
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://wcp:wcp@postgres:5432/wcp
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      phoenix:
        condition: service_started

  celery_worker:
    build: ./backend
    command: celery -A wcp_backend.workers.celery_worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://wcp:wcp@postgres:5432/wcp
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: celery -A wcp_backend.workers.celery_worker beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build: ./backend
    command: celery -A wcp_backend.workers.celery_worker flower --port=5555
    ports: ["5555:5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # ─── Agent (TypeScript) ─────────────────────────────
  agent:
    build: ./agent
    ports: ["3000:3000"]
    environment:
      BACKEND_URL: http://backend:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
    depends_on:
      backend:
        condition: service_started

  # ─── Frontend (React) ───────────────────────────────
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_PHOENIX_URL: http://localhost:6006
    depends_on:
      agent:
        condition: service_started

volumes:
  postgres_data:
  es_data:
  phoenix_data:
