services:
  backend:
    type: web
    name: wcp-backend
    runtime: python
    buildCommand: cd backend && pip install poetry && poetry install -E v4
    startCommand: cd backend && poetry run uvicorn wcp_backend.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ELASTICSEARCH_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PHASE
        value: "2"
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SAM_GOV_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PHOENIX_COLLECTOR_ENDPOINT
        sync: false
      - key: TRUST_SCORE_HIGH_BAND
        value: "0.85"
      - key: TRUST_SCORE_HUMAN_REVIEW_THRESHOLD
        value: "0.60"
      - key: TRUST_SCORE_MEDIUM_BAND
        value: "0.60"
    healthCheckPath: /health

  agent:
    type: web
    name: wcp-agent
    runtime: node
    buildCommand: cd agent && npm ci && npm run build
    startCommand: cd agent && node dist/server.js
    plan: starter
    envVars:
      - key: BACKEND_URL
        fromService:
          name: wcp-backend
          type: env
          property: hostport
      - key: NODE_ENV
        value: production
      - key: LLM_MODE
        value: real
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: JWT_SECRET
        sync: false
      - key: AUTH_DISABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: "3000"
      - key: SAM_GOV_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        sync: false
      - key: PHOENIX_COLLECTOR_ENDPOINT
        sync: false
      - key: TRUST_SCORE_HIGH_BAND
        value: "0.85"
      - key: TRUST_SCORE_REVIEW_THRESHOLD
        value: "0.60"
      - key: REDIS_HOST
        value: redis
      - key: REDIS_PORT
        value: "6379"
    healthCheckPath: /health
